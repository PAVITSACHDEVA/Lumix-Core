<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Lumix Core — Workspace</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="Assest/Logo.png" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.min.css">

    <!-- Local utility classes for a minimal frontend workspace -->
    <style>
        .w-full { width: 100%; }
        .text-xs { font-size: 0.75rem; }
        .opacity-70 { opacity: 0.7; }
        .cursor-pointer { cursor: pointer; }
        .underline { text-decoration: underline; }
    </style>

    <style>
        /* Base Layout */
        body {
            background: linear-gradient(270deg, #5b21b6, #d946ef, #5b21b6);
            background-size: 600% 600%;
            animation: gradientShift 15s ease infinite;
            font-family: 'Inter', sans-serif;
            color: white;
            margin: 0;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: all 0.4s ease;
        }

        #main-wrapper {
            display: flex;
            width: 100%;
            max-width: 1200px; /* Increased max-width for the panel */
            transition: transform 0.4s ease;
        }
        
        #app-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            overflow: hidden;
            transition: margin-left 0.4s ease;
        }

        .notes-header {
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
        }

        .notes-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            flex-grow: 1;
        }

        .notes-list {
            padding: 1.5rem;
            overflow-y: auto;
            flex-grow: 1;
            max-height: 70vh;
        }

        .notes-list::-webkit-scrollbar {
            width: 6px;
        }

        .notes-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        .note-card {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease-out;
        }

        .note-content {
            padding: 0.75rem 1.25rem;
            border-radius: 1rem;
            color: white;
            line-height: 1.6;
            word-wrap: break-word;
            max-width: 100%;
            font-size: 1rem;
            background: rgba(91, 33, 182, 0.6);
        }

        .note-content.warning {
            background: rgba(239, 68, 68, 0.4);
        }

        .note-meta {
            font-size: 0.75rem;
            color: #ddd;
            margin-top: 0.5rem;
            opacity: 0.7;
        }

        .notes-input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        .input-wrapper {
            display: flex;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 0.5rem;
        }

        input[data-testid="notes-input"] {
            padding: 0.75rem;
            border: none;
            width: 100%;
            font-size: 1rem;
            color: white;
            background: transparent;
            outline: none;
        }

        button {
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .summary-buttons {
            display: flex;
            justify-content: center;
            align-items: center; /* Vertically align items */
            gap: 0.5rem;
            padding: 0 1.5rem 1rem;
            background: rgba(0, 0, 0, 0.2);
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            font-weight: 700;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }

        .markdown-body p {
            margin-bottom: 1rem;
        }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 1.25rem;
            margin-bottom: 1rem;
        }

        .markdown-body blockquote {
            border-left: 4px solid rgba(255, 255, 255, 0.2);
            padding-left: 1rem;
            margin: 1rem 0;
            font-style: italic;
            color: rgba(255, 255, 255, 0.8);
        }

        .markdown-body a {
            color: #c4b5fd;
            text-decoration: underline;
        }

        .markdown-body summary {
            font-weight: 600;
            padding: 0.5rem;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }

        .markdown-body summary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            opacity: 1;
            transition: opacity 1s ease;
            will-change: opacity, transform;
        }

        .progress {
            display: block;
            margin-top: 16px;
        }

        .loading-title {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(270deg, #ff00cc, #3333ff, #00ffcc);
            background-size: 600% 600%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 6s ease infinite, pulseGlow 2s ease-in-out infinite;
            margin-bottom: 20px;
            max-width: 600px;
        }

        .loader-bar {
            width: 320px;
            height: 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 0 6px rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        .loader-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(270deg, #6EE7B7, #3B82F6, #9333EA);
            background-size: 400% 400%;
            animation: gradientFlow 4s ease infinite;
            transition: width 0.4s ease-in-out;
        }

        /* Light Mode */


        body.light-mode {
            background: linear-gradient(270deg, #e0e7ff, #fef3c7, #e0e7ff);
            background-size: 600% 600%;
            animation: gradientShift 15s ease infinite;
            color: #111;
            transition: color 0.3s ease;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Step 3: Light mode text contrast */


        body.light-mode .message-content {
            color: #111;
        }

        body.light-mode .avatar {
            color: #333;
        }

        body.light-mode .markdown-body h1,
        body.light-mode .markdown-body h2,
        body.light-mode .markdown-body h3 {
            color: #222;
        }

        body.light-mode .message-content,
        body.light-mode .markdown-body,
        body.light-mode .markdown-body p,
        body.light-mode .markdown-body li,
        body.light-mode .markdown-body blockquote,
        body.light-mode .avatar {
            color: #111 !important;
        }

        body.light-mode .input-wrapper {
            background: rgba(255, 255, 255, 0.6);
            /* frosted white */
            border-radius: 0.75rem;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        body.light-mode input[data-testid="chat-input"] {
            color: #111;
            background: transparent;
            font-weight: 500;
            font-size: 1rem;
        }

        body.light-mode input::placeholder {
            color: #666;
        }


        body.light-mode .markdown-body p,
        body.light-mode .markdown-body li,
        body.light-mode .markdown-body blockquote {
            color: #333;
        }

        body.light-mode .markdown-body code {
            background: rgba(0, 0, 0, 0.05);
            color: #111;
        }

        body.light-mode .timestamp {
            color: #666;
        }

        body.light-mode #app-container {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }


        body.light-mode .message.user .message-content {
            background: rgba(91, 33, 182, 0.1);
            /* soft purple */
        }

        body.light-mode .message.ai .message-content {
            background: rgba(255, 255, 255, 0.6);
            /* frosted white */
        }

        body.light-mode .chat-header,
        body.light-mode .chat-input-area,
        body.light-mode .summary-buttons,
        body.light-mode .utility-buttons {
            background: rgba(255, 255, 255, 0.3);
        }


        body.light-mode .message-content {
            color: #111;
        }

        body.light-mode .message.user .message-content {
            background: rgba(91, 33, 182, 0.1);
        }

        body.light-mode .message.ai .message-content {
            background: rgba(0, 0, 0, 0.05);
        }

        body.light-mode .markdown-body a {
            color: #4f46e5;
        }

        body.light-mode .timestamp {
            color: #555;
        }

        body.light-mode #themeToggleHeader {
            background-color: rgba(0, 0, 0, 0.05);
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.2);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        body.light-mode #themeToggleHeader:hover {
            background-color: rgba(0, 0, 0, 0.1);
            color: #000;
        }

        #themeToggleHeader {
            transition: all 0.3s ease;
        }

        body.light-mode #themeToggleHeader {
            background-color: rgba(0, 0, 0, 0.05);
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.2);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        body.light-mode #themeToggleHeader:hover {
            background-color: rgba(0, 0, 0, 0.1);
            color: #000;
        }

        #themeToggleHeader {
            transition: all 0.3s ease;
        }

        body.light-mode #themeToggleLoading {
            background-color: rgba(0, 0, 0, 0.05);
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.2);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        body.light-mode #themeToggleLoading:hover {
            background-color: rgba(0, 0, 0, 0.1);
            color: #000;
        }

        #themeToggleLoading {
            transition: all 0.3s ease;
        }

        body.light-mode #themeToggleLoading {
            background-color: rgba(0, 0, 0, 0.05);
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.2);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        body.light-mode #themeToggleLoading:hover {
            background-color: rgba(0, 0, 0, 0.1);
            color: #000;
        }

        #themeToggleLoading {
            transition: all 0.3s ease;
        }

        /* Base navbar styling */
        #navbara {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 14px 0;
            margin-bottom: 16px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .lumix-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            transition: background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }

        .lumix-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        body.light-mode .lumix-btn {
            background-color: rgba(0, 0, 0, 0.05);
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        body.light-mode .lumix-btn:hover {
            background-color: rgba(0, 0, 0, 0.1);
            color: #000;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.2);
        }

        /* Light mode override */
        body.light-mode #navbara {
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
        }

        /* Link styling */
        #navbara a {
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.2s ease, text-shadow 0.2s ease;
        }

        /* Hover effect */
        #navbara a:hover {
            transform: scale(1.05);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.9);
        }

        /* Gradient text animation */
        .gradient-text {
            background: linear-gradient(270deg, #ff00cc, #3333ff, #00ffcc);
            background-size: 600% 600%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 6s ease infinite;
        }

        .gradient-text:hover {
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
        }

        /* Light mode gradient text */
        body.light-mode .gradient-text {
            background: linear-gradient(270deg, #FFECC0, #FFC29B, #F39F9F, #B95E82);
            background-size: 600% 600%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: #111;
            animation: gradientShift 15s ease infinite;
        }

        /* Soften hover glow in light mode */
        body.light-mode .gradient-text:hover {
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.2);
        }

        body.light-mode #loading {
            background: linear-gradient(135deg, #fef3c7, #e0e7ff);
        }

        body.light-mode .loader-bar {
            background: rgba(0, 0, 0, 0.1);
            box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.2);
        }

        body.light-mode .loader-bar-fill {
            background: linear-gradient(270deg, #fbbf24, #60a5fa, #a78bfa);
            animation: gradientFlow 8s ease infinite;
        }

        /* Keyframes */
        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes pulseGlow {

            0%,
            100% {
                text-shadow: 0 0 4px rgba(255, 255, 255, 0.5);
            }

            50% {
                text-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
            }
        }

        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }
        .lumix-input-bar {
        margin-top: 16px;
        padding: 8px;
        }

        .lumix-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background-color: rgba(255, 255, 255, 0.1);
        color: white;
        transition: background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }

        .lumix-btn:hover {
        background-color: rgba(255, 255, 255, 0.2);
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        body.light-mode .lumix-btn {
        background-color: rgba(0, 0, 0, 0.05);
        color: #333;
        border: 1px solid rgba(0, 0, 0, 0.2);
        }

        body.light-mode .lumix-btn:hover {
        background-color: rgba(0, 0, 0, 0.1);
        color: #000;
        box-shadow: 0 0 6px rgba(0, 0, 0, 0.2);
        }

        body.light-mode [data-testid="send-button"] {
            background-color: #f3f4f6;
            color: #111;
            border: 1px solid #ccc;
        }

        body.light-mode [data-testid="mic-button"] {
            background-color: #f3f4f6;
            color: #111;
            border: 1px solid #ccc;
        }

        /* Smooth everything when theme toggles */
        body,
        #loading,
        .loading-title,
        .loader-bar,
        .loader-bar-fill {
            transition: background 0.4s ease,
                box-shadow 0.4s ease,
                color 0.4s ease;
        }

        /* --- 🎨 NEW FEATURES STYLES 🧠 --- */
        
        /* AI Avatar Panel */
        #avatar-panel-toggle {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1001;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            padding: 0;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        body.light-mode #avatar-panel-toggle {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #333;
        }

        #workspace-panel {
            width: 300px;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateX(-100%);
            transition: transform 0.4s ease;
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            z-index: 1000;
        }

        body.panel-open #workspace-panel {
            transform: translateX(0);
        }

        body.panel-open #app-container {
            margin-left: 300px; /* Push content window */
        }

        .avatar-container { text-align: center; margin-bottom: 2rem; }
        .workspace-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #58a6ff 0%, #b4bfff 40%, #d6bcfa 100%);
            margin: 0 auto 1rem;
            border: 3px solid rgba(255, 255, 255, 0.5);
            animation: pulse-avatar 2.4s infinite ease-in-out;
        }
        @keyframes pulse-avatar {
            0%, 100% { box-shadow: 0 0 15px rgba(88, 166, 255, 0.5); }
            50% { box-shadow: 0 0 30px rgba(88, 166, 255, 1); }
        }
        .avatar-container h3 { font-size: 1.25rem; font-weight: 600; }
        
        /* Voice Toggle Switch */
        .feature-control { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; }
        input:checked + .slider { background-color: #d946ef; }
        input:checked + .slider:before { transform: translateX(26px); }
        .slider.round { border-radius: 34px; }
        .slider.round:before { border-radius: 50%; }

        /* Animated Typing Indicator */
        .typing-indicator { display: flex; align-items: center; gap: 5px; }
        .animated-cursor {
            width: 3px;
            height: 20px;
            background-color: #c4b5fd;
            animation: blink 1s infinite;
            margin-left: 5px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Utility Buttons & Explain This */
        .utility-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            padding: 0 1.5rem 1rem;
            background: rgba(0, 0, 0, 0.2);
        }
        .explain-btn { cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
        .explain-btn:hover { opacity: 1; }
        .tooltip {
            position: fixed;
            background: #333;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            z-index: 1010;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        /* Context-Aware Suggestions */
        #context-suggestions {
            padding: 0.5rem 1.5rem;
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            background: rgba(0,0,0,0.1);
        }
        .suggestion-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            white-space: nowrap;
        }
         body.light-mode .suggestion-btn {
            background: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.1);
            color: #333;
        }

        /* Responsiveness for new features */
        @media (max-width: 768px) {
            body.panel-open #app-container {
                margin-left: 0; /* Don't push chat on mobile */
                transform: translateX(300px); /* Slide chat window instead */
            }
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="loading-title" id="loadingText"></div>
        <div class="loader-bar">
            <div class="loader-bar-fill" id="loaderFill"></div>
        </div>
        <button id="themeToggleLoading" class="btn btn-outline-light d-flex align-items-center gap-2">
            <i class="theme-icon bi bi-brightness-high"></i>
            <span class="theme-label">Light Mode</span>
        </button>
    </div>

    <!-- Workspace Panel Toggle Button -->
    <button id="avatar-panel-toggle" title="Toggle Workspace Panel"><i class="bi bi-person-bounding-box" style="font-size: 1.5rem;"></i></button>

    <div id="main-wrapper">
        <!-- WORKSPACE PANEL -->
        <div id="workspace-panel">
            <div class="avatar-container">
                <div class="workspace-avatar"></div>
                <h3>Lumix Core</h3>
            </div>
            <div class="feature-control">
                <div>
                    <p class="panel-title">Workspace shortcuts</p>
                    <p class="panel-subtitle">Quick access to notes, projects, and inspiration.</p>
                </div>
            </div>
             <div class="history-container">
                <h4>Quick Start</h4>
                <div class="text-xs opacity-70">
                    <p>Add a note to create a workspace entry. Export or import your content anytime.</p>
                </div>
            </div>
        </div>

        <!-- MAIN APP CONTAINER -->
        <div id="app-container">
            <div id="navbara" class="index">
                <a href="index.html" class="gradient-text" data-sound-id="sound-home">Home</a>
                <a href="Genartor.html" class="gradient-text" data-sound-id="sound-generator">Projects</a>
                <a href="Converter.html" class="gradient-text" data-sound-id="sound-convert">Components</a>
                <a href="ABOUT.HTML" class="gradient-text" data-sound-id="sound-about">About</a>
            </div>
            <div class="chat-header">
                <h1> Notes</h1>
                <button id="themeToggleHeader" class="btn btn-outline-light d-flex align-items: center gap-2">
                    <i class="theme-icon bi bi-brightness-high"></i>
                    <span class="theme-label">Light Mode</span>
                </button>
            </div>
            <div class="chat-box" data-testid="chat-container"></div>
            
            <div class="summary-buttons">
                <button data-testid="export-notes" class="w-full">Export Notes</button>
                <i class="bi bi-question-circle explain-btn" data-tooltip="Export your notes as JSON."></i>
                <button data-testid="import-notes" class="w-full">Import Notes</button>
                <i class="bi bi-question-circle explain-btn" data-tooltip="Import notes from a JSON file."></i>
            </div>

            <div class="utility-buttons">
                <button id="new-template" class="w-full">New Note Template</button>
                <i class="bi bi-question-circle explain-btn" data-tooltip="Insert a starter note template."></i>
            </div>

            <div id="context-suggestions"></div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" data-testid="chat-input" placeholder="Write a new note title or content..." />
                    <div class="lumix-input-bar d-flex gap-3 justify-content-center align-items-center">
                        <button data-testid="loc-button" title="Pin note" class="lumix-btn loc-btn">
                            <i class="bi bi-pin-fill"></i>
                        </button>
                        <button data-testid="mic-button" title="Voice (disabled)" class="lumix-btn mic-btn" disabled>
                            <i class="bi bi-mic-mute-fill"></i>
                        </button>
                        <button data-testid="send-button" title="Add Note" class="lumix-btn send-btn">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Tooltip element -->
    <div id="tooltip" class="tooltip"></div>

    <script>
        const NOTES_KEY = 'lumix_notes_v1';
        const input = document.querySelector('[data-testid="chat-input"]');
        const sendButton = document.querySelector('[data-testid="send-button"]');
        const chatContainer = document.querySelector('[data-testid="chat-container"]');
        const exportButton = document.querySelector('[data-testid="export-notes"]');
        const importButton = document.querySelector('[data-testid="import-notes"]');
        const newTemplateButton = document.getElementById('new-template');
        const avatarPanelToggle = document.getElementById('avatar-panel-toggle');
        const tooltip = document.getElementById('tooltip');
        const links = document.querySelectorAll('.gradient-text');
        const toggles = [document.getElementById('themeToggleLoading'), document.getElementById('themeToggleHeader')].filter(Boolean);

        let notes = [];

        function saveNotes() {
            localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
        }

        function loadNotes() {
            try {
                notes = JSON.parse(localStorage.getItem(NOTES_KEY) || '[]');
            } catch {
                notes = [];
            }
            renderNotes();
        }

        function renderNotes() {
            chatContainer.innerHTML = '';
            if (notes.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'markdown-body text-center opacity-70';
                empty.innerHTML = '<p>No notes yet — add one using the input below.</p>';
                chatContainer.appendChild(empty);
                return;
            }

            notes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'message user mb-4';
                const ts = new Date(note.created).toLocaleString();
                card.innerHTML = `
                    <div class="font-bold mb-1">${note.pinned ? '📌 ' : ''}${note.title || 'Note'}</div>
                    <div class="message-content">${(note.content || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>')}</div>
                    <div class="text-xs opacity-60 mt-1 note-meta">${ts} • <a href="#" class="delete-note" data-id="${note.id}">Delete</a></div>
                `;
                chatContainer.appendChild(card);
            });

            chatContainer.querySelectorAll('.delete-note').forEach(button => {
                button.addEventListener('click', (event) => {
                    event.preventDefault();
                    const id = button.dataset.id;
                    notes = notes.filter(item => item.id.toString() !== id.toString());
                    saveNotes();
                    renderNotes();
                });
            });

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addNoteFromInput() {
            const raw = input.value.trim();
            if (!raw) return;
            const parts = raw.split('\n');
            const title = parts[0].slice(0, 80);
            const note = {
                id: Date.now(),
                title,
                content: raw,
                created: new Date().toISOString(),
                pinned: false
            };
            notes.unshift(note);
            saveNotes();
            renderNotes();
            input.value = '';
            input.focus();
        }

        function exportNotes() {
            const blob = new Blob([JSON.stringify(notes, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = 'lumix-notes.json';
            anchor.click();
            URL.revokeObjectURL(url);
        }

        function importNotesFile(file) {
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const imported = JSON.parse(reader.result);
                    if (!Array.isArray(imported)) {
                        alert('Invalid notes file.');
                        return;
                    }
                    notes = imported.concat(notes);
                    saveNotes();
                    renderNotes();
                } catch (error) {
                    alert('Could not parse the file.');
                }
            };
            reader.readAsText(file);
        }

        function insertTemplate() {
            input.value = 'Daily Review\n- What I learned today:\n- Tasks completed:\n- Focus for tomorrow:';
            input.focus();
        }

        function updateThemeUI() {
            const light = document.body.classList.contains('light-mode');
            document.querySelectorAll('.theme-icon').forEach(icon => {
                icon.className = light ? 'theme-icon bi bi-moon-fill' : 'theme-icon bi bi-brightness-high';
            });
            document.querySelectorAll('.theme-label').forEach(label => {
                label.textContent = light ? 'Dark Mode' : 'Light Mode';
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            updateThemeUI();
        }

        function attachTooltip(button) {
            button.addEventListener('mouseover', (e) => {
                tooltip.textContent = button.dataset.tooltip;
                tooltip.style.opacity = '1';
                tooltip.style.left = `${e.clientX + 15}px`;
                tooltip.style.top = `${e.clientY + 15}px`;
            });
            button.addEventListener('mousemove', (e) => {
                tooltip.style.left = `${e.clientX + 15}px`;
                tooltip.style.top = `${e.clientY + 15}px`;
            });
            button.addEventListener('mouseout', () => {
                tooltip.style.opacity = '0';
            });
        }

        function init() {
            loadNotes();

            sendButton.addEventListener('click', addNoteFromInput);
            input.addEventListener('keydown', event => {
                if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    addNoteFromInput();
                }
            });

            exportButton.addEventListener('click', exportNotes);
            importButton.addEventListener('click', () => {
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = '.json';
                fileInput.addEventListener('change', () => {
                    if (fileInput.files?.[0]) {
                        importNotesFile(fileInput.files[0]);
                    }
                });
                fileInput.click();
            });

            newTemplateButton.addEventListener('click', insertTemplate);
            avatarPanelToggle.addEventListener('click', () => document.body.classList.toggle('panel-open'));
            toggles.forEach(button => button.addEventListener('click', toggleTheme));
            updateThemeUI();

            document.querySelectorAll('.explain-btn').forEach(attachTooltip);

            links.forEach(link => {
                link.addEventListener('click', event => {
                    const soundId = link.getAttribute('data-sound-id');
                    const sound = soundId ? document.getElementById(soundId) : null;
                    if (sound) {
                        event.preventDefault();
                        sound.currentTime = 0;
                        sound.play();
                        sound.addEventListener('ended', function handleEnd() {
                            window.location.href = link.getAttribute('href');
                            sound.removeEventListener('ended', handleEnd);
                        });
                    }
                });
            });

            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.opacity = '0';
                setTimeout(() => loading.remove(), 500);
            }
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
    <audio id="sound-home" src="./Assest/Home.mp3" preload="auto"></audio>
    <audio id="sound-lumixcore" src="./Assest/lumix core ai.mp3" preload="auto"></audio>
    <audio id="sound-convert" src="./Assest/Image Converter.mp3" preload="auto"></audio>
    <audio id="sound-about" src="./Assest/About the AI.mp3" preload="auto"></audio>
    <audio id="sound-generator" src="./Assest/Random Image Generator.mp3" preload="auto"></audio>
</body>
</html>
